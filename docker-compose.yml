version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: jobfinder-postgres
    environment:
      POSTGRES_DB: jobfinder_db
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - jobfinder-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d jobfinder_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  mongo:
    image: mongo:7.0
    container_name: jobfinder-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongodbdata:/data/db
    networks:
      - jobfinder-net
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: jobfinder-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - jobfinder-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobfinder-backend
    ports:
      - "9959:3001"
    environment:
      NODE_ENV: development
      DATABASE_TYPE: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: root
      DB_PASSWORD: password
      DB_NAME: jobfinder_db
      DATABASE_URL: "postgresql://root:password@postgres:5432/jobfinder_db?schema=public"
      JWT_SECRET: jobfinder-secret-key-2024
      JWT_REFRESH_SECRET: jobfinder-refresh-secret-key-2024
      MONGODB_URI: mongodb://mongo:27017/jobfinder
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3001
      FRONTEND_URL: http://localhost:3000
      BACKOFFICE_URL: http://localhost:3002
      THROTTLE_TTL: 60
      THROTTLE_LIMIT: 100
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - jobfinder-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  landingpage:
    build:
      context: ./landingpage
      dockerfile: Dockerfile
    container_name: jobfinder-landingpage
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:9959/api
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - jobfinder-net
    restart: unless-stopped

  backoffice:
    build:
      context: ./backoffice
      dockerfile: Dockerfile
    container_name: jobfinder-backoffice
    ports:
      - "3002:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:9959/api
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - jobfinder-net
    restart: unless-stopped

volumes:
  pgdata:
  mongodbdata:
  redisdata:

networks:
  jobfinder-net:
    driver: bridge
